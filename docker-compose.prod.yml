services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-vendure}
      POSTGRES_USER: ${DB_USER:-vendure}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vendure}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - APP_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vendure}
      - DB_USERNAME=${DB_USER:-vendure}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SCHEMA=public
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SUPERADMIN_USERNAME=${SUPERADMIN_USERNAME:-superadmin}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    volumes:
      - server-assets:/usr/src/app/apps/server/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    restart: always
    command: ["node", "./apps/server/dist/index-worker.js"]
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vendure}
      - DB_USERNAME=${DB_USER:-vendure}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SCHEMA=public
      - COOKIE_SECRET=${COOKIE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  storefront:
    build:
      context: .
      dockerfile: ./apps/storefront/Dockerfile
      args:
        - NEXT_PUBLIC_VENDURE_SHOP_API_URL=https://api.parkpicasso.com/shop-api
        - NEXT_PUBLIC_VENDURE_ASSET_URL=https://api.parkpicasso.com
    restart: always
    ports:
      - "3001:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_VENDURE_SHOP_API_URL=https://api.parkpicasso.com/shop-api
      - NEXT_PUBLIC_VENDURE_ASSET_URL=https://api.parkpicasso.com
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
  server-assets:
