services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-vendure}
      POSTGRES_USER: ${DB_USER:-vendure}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./data/redis:/data

  # Vendure API Server
  server:
    build: 
      context: .
      dockerfile: apps/server/Dockerfile
    restart: always
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      API_PORT: 3000
      IS_DEV: "false"
      APP_ENV: production
      # IMPORTANT: Add your secret keys here
      COOKIE_SECRET: ${COOKIE_SECRET}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin}
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    volumes:
      - ./apps/server/static-assets:/usr/src/app/static-assets

  # Vendure Worker
  worker:
    build: 
      context: .
      dockerfile: apps/server/Dockerfile
    command: npm run start:worker -w server
    restart: always
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - postgres
      - redis

  # Storefront (Next.js)
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_VENDURE_SHOP_API_URL: https://api.parkpicasso.com/shop-api
    environment:
      VENDURE_SHOP_API_URL: http://server:3000/shop-api
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - server

  # Management Panel
  management:
    build:
      context: .
      dockerfile: managment/Dockerfile
      args:
        VITE_VENDURE_API_URL: https://api.parkpicasso.com/shop-api
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - server
